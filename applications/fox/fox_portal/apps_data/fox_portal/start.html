<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Get In Touch</title>
<style>
body{margin:0;background:#111;color:#eee;font-family:sans-serif;text-align:center;padding:40px 20px}
h1{color:#FF6600;font-size:1.6em;margin-bottom:10px}
p{font-size:0.95em;color:#ccc;margin-bottom:30px}
input{width:100%;max-width:280px;padding:12px;margin:8px 0;border-radius:8px;border:none;font-size:1em;box-sizing:border-box}
button{width:100%;max-width:280px;padding:12px;margin-top:10px;border-radius:8px;border:none;background:#FF6600;color:#111;font-weight:bold;font-size:1em}
</style>
</head>
<body>
<h1>Get In Touch</h1>
<p>Leave your details and we'll follow up shortly.</p>
<form method="POST" action="/">
<input type="text" name="name" placeholder="Your name">
<input type="text" name="phone" placeholder="Phone number">
<button type="submit">Submit</button>
</form>
</body>
</html>
